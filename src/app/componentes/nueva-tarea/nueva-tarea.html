<div class="backdrop" (click)="alCancelar()"></div>
<dialog open>
  <h2>Nueva Tarea</h2>
  <form (ngSubmit)="alEnviar()"> <p>
      <label for="titulo">Título</label>
      <input type="text" id="titulo" name="titulo" [(ngModel)]="tituloIngresado" />
    </p>
    <p>
      <label for="resumen">Resumen</label>
      <textarea id="resumen" name="resumen" rows="5" [(ngModel)]="resumenIngresado"></textarea>
    </p>
    <p>
      <label for="fecha">Fecha límite</label>
      <input type="date" id="fecha" name="fecha" [(ngModel)]="fechaIngresada" />
    </p>
    <p class="actions">
      <button type="button" (click)="alCancelar()">Cancelar</button>
      <button type="submit">Guardar</button>
    </p>
  </form>
</dialog>
